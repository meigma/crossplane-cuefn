language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'crossplane-cuefn'
  description: 'Crossplane v2 composition function that renders Kubernetes resources from CUE modules.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

# Every task runs against `system` binaries that mise (mise.toml + mise.lock) puts
# on PATH; moon manages no language toolchain itself.
toolchains:
  default: 'system'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'input/**/*.go'
    - 'go.mod'
    - 'go.sum'
    # Tool/version pins. Under the `system` toolchain moon does not hash the Go
    # binary's version, so the mise pins are inputs here too — bumping Go (or any
    # tool) in mise must invalidate the cacheable build task.
    - 'mise.toml'
    - 'mise.lock'
  lintConfig:
    - '.golangci.yml'
    - 'mise.toml'
    - 'mise.lock'
  cueModules:
    # CUE fixtures the tests evaluate: the shared hermetic fixture module the unit
    # and integration suites load (decoupled from the user-facing example/ module,
    # which may import external schemas) and the per-case testdata modules
    # (including the OCI fixtures under internal/render/testdata/oci, published to a
    # throwaway registry by the integration tests). Listed as test inputs so the
    # test task stays correct if caching is ever enabled.
    - 'internal/test/common/testdata/**/*.cue'
    - 'internal/render/testdata/**/*.cue'
    # The author-time codegen fixtures (de-risked, no-status, and the negative
    # type-crossing-disjunction module) consumed by the schema unit tests and the
    # chainsaw CRD.
    - 'internal/schema/testdata/**/*.cue'
    # The shipped contract module, loaded by internal/contract's closedness test.
    - 'contract/**/*.cue'
    # The kind e2e module fixture (an all-Ready variant of the example module),
    # published to the throwaway module registry by the e2e harness.
    - 'internal/test/e2e/testdata/**/*.cue'
  # Declarative chainsaw assets the build-tagged schema-test harness stages and
  # applies against an envtest apiserver.
  chainsawAssets:
    - 'test/chainsaw/**/*.yaml'
  # The controller-gen sources: the Input type and its package markers. Bumping
  # either must invalidate the generate / generate-check tasks (which emit both
  # the deepcopy and the Input CRD embedded in the Function xpkg).
  generateSources:
    - 'input/v1beta1/doc.go'
    - 'input/v1beta1/input.go'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/workflows.disabled/**/*.yml'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'golangci-lint fmt --config .golangci.yml --diff'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'golangci-lint run --config .golangci.yml ./... --show-stats=false'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build -o bin/cuefn ./cmd/cuefn'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/cuefn'

  # The OCI loader integration tests publish CUE modules to a throwaway
  # registry:2 container via testcontainers-go. They need a running Docker
  # daemon (present on CI's ubuntu-latest runners) and self-skip when none is
  # available, so this task stays green on a developer machine without Docker.
  test:
    command: 'go test ./...'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
    options:
      cache: false

  # Regenerate the input/v1beta1 deepcopy AND the Input CRD (embedded in the
  # Function xpkg) from the kubebuilder markers. Driven by the go.mod `tool`
  # directive (controller-gen pinned at v0.20.0), not a mise tool, so the
  # generator version travels with go.sum.
  generate:
    command: 'bash -c "go tool controller-gen object paths=./input/... && go tool controller-gen crd:crdVersions=v1 paths=./input/... output:crd:dir=internal/pkg/inputcrd"'
    inputs:
      - '@group(generateSources)'
      - 'go.mod'
      - 'go.sum'
    outputs:
      - 'input/v1beta1/zz_generated.deepcopy.go'
      - 'internal/pkg/inputcrd/cuefn.meigma.io_inputs.yaml'

  # Fail if the committed deepcopy or the embedded Input CRD is stale: regenerate
  # both and diff the generated files, proving controller-gen is wired and the
  # checked-in outputs are current. Part of the default check graph (no Docker).
  generate-check:
    command: 'bash -c "go tool controller-gen object paths=./input/... && go tool controller-gen crd:crdVersions=v1 paths=./input/... output:crd:dir=internal/pkg/inputcrd && git diff --exit-code -- input/v1beta1/zz_generated.deepcopy.go internal/pkg/inputcrd/cuefn.meigma.io_inputs.yaml"'
    inputs:
      - '@group(generateSources)'
      - 'input/v1beta1/zz_generated.deepcopy.go'
      - 'internal/pkg/inputcrd/cuefn.meigma.io_inputs.yaml'
      - 'go.mod'
      - 'go.sum'
    options:
      cache: false

  # End-to-end crossplane render loop: publishes the hermetic fixture module to a
  # throwaway OCI registry, serves `cuefn function --insecure`, and runs
  # `crossplane render` over the hermetic render-loop assets. Needs a Docker daemon and the
  # pinned crossplane CLI. The heavy tests env-gate on CUEFN_INTEGRATION (set
  # here) so plain `go test ./...` / `root:test` skips them; this task is NOT a
  # dependency of `check` (the blocking `ci` gate runs `moon run root:check`), so
  # it runs only in the separate, non-blocking integration workflow — keeping `ci`
  # fast and reliable. Run under `mise exec` so the pinned crossplane CLI wins
  # over any proto shim on PATH.
  render-test:
    command: 'mise exec -- go test ./internal/test/integration/... -run TestRenderLoop -count 1'
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - 'internal/test/common/testdata/renderloop/**'
    options:
      cache: false
  # OCI module loader integration: publishes module fixtures to a throwaway OCI
  # registry (testcontainers) and exercises the OCILoader — transitive deps, the
  # digest-keyed cache, digest-drift rejection, and error paths. Needs a Docker
  # daemon. Env-gated (CUEFN_INTEGRATION) so `go test ./...` skips it; not a
  # dependency of `check`, so it runs only in the integration workflow.
  oci-test:
    command: 'mise exec -- go test ./internal/test/integration/... -run TestOCI -count 1'
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
    options:
      cache: false
  # Configuration publish + xpkg validation + supply-chain proof: runs the
  # `cuefn publish` end-to-end flow (build + push a Configuration xpkg, then
  # verify the recorded module digest and that the runtime loader accepts it and
  # rejects drift), the `crossplane xpkg extract` acceptance check for both the
  # Configuration and Function packages (TestXpkgValidate), and the Function xpkg
  # supply-chain test (cosign sign/verify + syft SBOM, each gated subtest).
  # Needs a Docker daemon (throwaway registry) plus the pinned crossplane, cosign,
  # and syft CLIs; per-tool cases self-skip when their tool is absent. Kept OUT of
  # the default `check` graph so `moon run root:check` needs none of them. Run
  # under `mise exec` so the pinned crossplane/cosign/syft win over any binary on PATH.
  publish-test:
    command: "mise exec -- go test ./internal/test/integration/... -run 'TestPublish_EndToEnd|TestXpkgValidate|TestFunctionXpkgSupplyChain' -count 1"
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
    options:
      cache: false
  # Function image + publish-function proof: runs the apko dev-image smoke test
  # (TestImageServesFunction_NoArgs — the image's default `cmd: function` reaches
  # the gRPC serve path rather than printing root help), assembles the Function
  # package over the real apko runtime base and confirms the PACKAGED image still
  # serves the gRPC FunctionRunnerService (TestFunctionPackageServesGRPC), and
  # drives the `cuefn publish-function` command end-to-end including the multi-arch
  # index (TestPublishFunction_*). Needs a Docker daemon and the locally built
  # `crossplane-cuefn:dev` image; the cases self-skip when absent, so the task is
  # kept OUT of the default `check` graph (mirroring render-test/publish-test).
  # Build the dev image first with `mise run image-local`. Run under `mise exec` so
  # the pinned crossplane CLI wins over any binary on PATH.
  funcpkg-test:
    command: "mise exec -- go test ./internal/test/integration/... -run 'TestImageServesFunction|TestFunctionPackageServesGRPC|TestPublishFunction' -count 1"
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
    options:
      cache: false
  # Guard the lean image binary: the melange/apko build compiles with `-tags
  # noxpkg` to drop the publish commands (and internal/pkg's sigstore/cosign +
  # cloud-cred graph) from the runtime image — measured at 12.1 MiB / 23% of the
  # stripped binary. This task proves that build still compiles, so the lean path
  # cannot silently rot. Part of the default check graph (no Docker needed).
  build-image-binary:
    command: 'go build -tags noxpkg -o bin/cuefn-noxpkg ./cmd/cuefn'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/cuefn-noxpkg'

  # Server-side author-time schema proof: boots an envtest apiserver, generates
  # the de-risked module's XRD, wraps it as a real CRD, and drives chainsaw plus a
  # typed client to exercise structural acceptance, apiserver defaulting, unknown-
  # field pruning, and a status subresource round-trip. Gated behind the `envtest`
  # build tag and the chainsaw/setup-envtest binaries (pinned in mise); self-skips
  # without them. Kept OUT of the default `check` graph (mirroring render-test) so
  # `moon run root:check` stays green without those tools.
  schema-test:
    # Run under `mise exec` so the mise-pinned chainsaw and setup-envtest win over
    # any proto shims on PATH. Install the envtest binaries (idempotent), then run
    # the build-tagged harness; the harness resolves KUBEBUILDER_ASSETS itself via
    # `setup-envtest` (and honors the env var when set), so no command
    # substitution is needed.
    command: "mise exec -- bash -c 'setup-envtest use 1.35.0 -p path && go test -tags envtest ./internal/test/integration/... -run TestSchema_Chainsaw -count 1'"
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - '@group(chainsawAssets)'
    options:
      cache: false
  # Guard the committed, generated example/xrd.yaml against drift: regenerate the
  # XRD from the example module with `cuefn generate` and diff it against the
  # checked-in file. Like generate-check this is pure CUE codegen (no Docker), so
  # it lives in the default check graph. Regenerate the committed file with:
  #   go run ./cmd/cuefn generate cuefn.example/app@v0 --dir example/module \
  #     --output example/xrd.yaml
  xrd-check:
    command: 'bash -c "mkdir -p bin && go run ./cmd/cuefn generate cuefn.example/app@v0 --dir example/module --output bin/xrd.gen.yaml && diff -u example/xrd.yaml bin/xrd.gen.yaml"'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - 'example/module/**/*.cue'
      - 'example/xrd.yaml'
    options:
      cache: false

  # Render smoke for the user-facing example: prove the example module still
  # evaluates and renders its Kubernetes objects (instantiated from the official
  # cue.dev/x/k8s.io schema, resolved from the default central registry) — the
  # light "it doesn't break" check the example gets instead of being woven into
  # the unit test suite. Like xrd-check it loads the example's dependency, so CI
  # warms the CUE module cache (see .github/workflows/ci.yml).
  example-check:
    command: 'bash -c "mkdir -p bin && go run ./cmd/cuefn render cuefn.example/app@v0 --dir example/module --xr example/xr.yaml > bin/render.out && cat bin/render.out && grep -q Deployment bin/render.out && grep -q Service bin/render.out && grep -q ConfigMap bin/render.out"'
    inputs:
      - '@group(goSources)'
      - 'example/module/**/*.cue'
      - 'example/xr.yaml'
    options:
      cache: false

  # Kind end-to-end proof: boots a throwaway kind cluster, stands up a CA-trusted
  # HTTPS registry (Crossplane xpkgs) and a plain-HTTP registry (CUE modules),
  # installs Crossplane via helm, publishes + installs the Function (P6) and the
  # generated Configuration (P5), instantiates an XR + EnvironmentConfig, and
  # asserts the live reconcile (Ready, composed resources, status, defaulting,
  # env-merge) and the digest-drift guard via chainsaw. Needs Docker plus the
  # mise-pinned kind/kubectl/helm/chainsaw and the `crossplane-cuefn:dev` image
  # (build it first with `mise run image-local`). Gated behind the `e2e` build tag
  # and CUEFN_INTEGRATION (set here); self-skips when its tools are absent. Kept
  # OUT of the default `check` graph (mirroring schema-test/render-test) so
  # `moon run root:check` stays green without a cluster. Run under `mise exec` so
  # the pinned kind/kubectl/helm/chainsaw/crossplane win over any binaries on PATH.
  e2e-test:
    command: 'mise exec -- go test -tags e2e ./internal/test/e2e/... -run TestE2E_Kind -count 1 -timeout 30m'
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - '@group(chainsawAssets)'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:build-image-binary'
      - 'root:test'
      - 'root:generate-check'
      - 'root:xrd-check'
      - 'root:example-check'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(cueModules)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
