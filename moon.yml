language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'crossplane-cuefn'
  description: 'Crossplane v2 composition function that renders Kubernetes resources from CUE modules.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

# Every task runs against `system` binaries that mise (mise.toml + mise.lock) puts
# on PATH; moon manages no language toolchain itself.
toolchains:
  default: 'system'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'input/**/*.go'
    - 'go.mod'
    - 'go.sum'
    # Tool/version pins. Under the `system` toolchain moon does not hash the Go
    # binary's version, so the mise pins are inputs here too — bumping Go (or any
    # tool) in mise must invalidate the cacheable build task.
    - 'mise.toml'
    - 'mise.lock'
  lintConfig:
    - '.golangci.yml'
    - 'mise.toml'
    - 'mise.lock'
  cueModules:
    # CUE fixtures the render tests evaluate: the canonical example module and
    # the per-case testdata modules (including the OCI fixtures under
    # internal/render/testdata/oci, published to a throwaway registry by the
    # integration tests). Listed as test inputs so the test task stays correct
    # if caching is ever enabled.
    - 'example/**/*.cue'
    - 'internal/render/testdata/**/*.cue'
    # The author-time codegen fixtures (de-risked, no-status, and the negative
    # type-crossing-disjunction module) consumed by the schema unit tests and the
    # chainsaw CRD.
    - 'internal/schema/testdata/**/*.cue'
  # Declarative chainsaw assets the build-tagged schema-test harness stages and
  # applies against an envtest apiserver.
  chainsawAssets:
    - 'test/chainsaw/**/*.yaml'
  # The controller-gen sources: the Input type and its package markers. Bumping
  # either must invalidate the generate / generate-check tasks (which emit both
  # the deepcopy and the Input CRD embedded in the Function xpkg).
  generateSources:
    - 'input/v1beta1/doc.go'
    - 'input/v1beta1/input.go'
  # Hand-written example assets (XRD/Composition/XR/EnvironmentConfig/functions)
  # exercised by the crossplane render-loop integration test.
  exampleAssets:
    - 'example/**/*.yaml'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'ghd.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/workflows.disabled/**/*.yml'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'golangci-lint fmt --config .golangci.yml --diff'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'golangci-lint run --config .golangci.yml ./... --show-stats=false'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build -o bin/cuefn ./cmd/cuefn'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/cuefn'

  # The OCI loader integration tests publish CUE modules to a throwaway
  # registry:2 container via testcontainers-go. They need a running Docker
  # daemon (present on CI's ubuntu-latest runners) and self-skip when none is
  # available, so this task stays green on a developer machine without Docker.
  test:
    command: 'go test ./...'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
    options:
      cache: false

  # Regenerate the input/v1beta1 deepcopy AND the Input CRD (embedded in the
  # Function xpkg) from the kubebuilder markers. Driven by the go.mod `tool`
  # directive (controller-gen pinned at v0.20.0), not a mise tool, so the
  # generator version travels with go.sum.
  generate:
    command: 'bash -c "go tool controller-gen object paths=./input/... && go tool controller-gen crd:crdVersions=v1 paths=./input/... output:crd:dir=internal/pkg/inputcrd"'
    inputs:
      - '@group(generateSources)'
      - 'go.mod'
      - 'go.sum'
    outputs:
      - 'input/v1beta1/zz_generated.deepcopy.go'
      - 'internal/pkg/inputcrd/cuefn.meigma.io_inputs.yaml'

  # Fail if the committed deepcopy or the embedded Input CRD is stale: regenerate
  # both and diff the generated files, proving controller-gen is wired and the
  # checked-in outputs are current. Part of the default check graph (no Docker).
  generate-check:
    command: 'bash -c "go tool controller-gen object paths=./input/... && go tool controller-gen crd:crdVersions=v1 paths=./input/... output:crd:dir=internal/pkg/inputcrd && git diff --exit-code -- input/v1beta1/zz_generated.deepcopy.go internal/pkg/inputcrd/cuefn.meigma.io_inputs.yaml"'
    inputs:
      - '@group(generateSources)'
      - 'input/v1beta1/zz_generated.deepcopy.go'
      - 'internal/pkg/inputcrd/cuefn.meigma.io_inputs.yaml'
      - 'go.mod'
      - 'go.sum'
    options:
      cache: false

  # End-to-end crossplane render loop: publishes the example module to a
  # throwaway OCI registry, serves `cuefn function --insecure`, and runs
  # `crossplane render` over the example assets. Needs a Docker daemon and the
  # pinned crossplane CLI. The heavy tests env-gate on CUEFN_INTEGRATION (set
  # here) so plain `go test ./...` / `root:test` skips them; this task is NOT a
  # dependency of `check` (the blocking `ci` gate runs `moon run root:check`), so
  # it runs only in the separate, non-blocking integration workflow — keeping `ci`
  # fast and reliable. Run under `mise exec` so the pinned crossplane CLI wins
  # over any proto shim on PATH.
  render-test:
    command: 'mise exec -- go test ./internal/function/... -run TestRenderLoop -count 1'
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - '@group(exampleAssets)'
    options:
      cache: false
  # OCI module loader integration: publishes module fixtures to a throwaway OCI
  # registry (testcontainers) and exercises the OCILoader — transitive deps, the
  # digest-keyed cache, digest-drift rejection, and error paths. Needs a Docker
  # daemon. Env-gated (CUEFN_INTEGRATION) so `go test ./...` skips it; not a
  # dependency of `check`, so it runs only in the integration workflow.
  oci-test:
    command: 'mise exec -- go test ./internal/render/... -run TestOCI -count 1'
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
    options:
      cache: false
  # Configuration packaging + push proof: assembles a Crossplane Configuration
  # xpkg (and a prototype Function xpkg) from a CUE module, pushes it to a
  # throwaway OCI registry, round-trips the contents, and validates the package
  # with the pinned crossplane CLI (`crossplane xpkg extract`). The push/round-trip
  # cases need a Docker daemon; the xpkg-validate cases need the crossplane CLI.
  # Both self-skip when their tool is absent, but the task is kept OUT of the
  # default `check` graph (mirroring render-test) so `moon run root:check` needs
  # neither Docker nor crossplane. Run under `mise exec` so the pinned crossplane
  # CLI wins over any binary on PATH.
  publish-test:
    command: "mise exec -- go test ./internal/pkg/... ./internal/cli/... -run 'TestPublish|TestConfigurationRoundTrip|TestXpkgValidate|TestFunctionXpkg|TestFunctionIndex' -count 1"
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - '@group(exampleAssets)'
    options:
      cache: false
  # Function xpkg packaging proof: assembles the Function package (meta + embedded
  # Input CRD) over the real apko runtime base, round-trips it through a throwaway
  # registry, validates it with the pinned crossplane CLI (`crossplane xpkg
  # extract`), signs + verifies it with cosign, generates + parses an SBOM with
  # syft, and runs the PACKAGED image to confirm it still serves the gRPC
  # FunctionRunnerService. The cases self-skip when their tool (Docker / crossplane
  # / cosign / syft / the `crossplane-cuefn:dev` image) is absent, so the task is
  # kept OUT of the default `check` graph (mirroring render-test/publish-test).
  # Build the dev image first with `mise run image-local` so the embed-runtime and
  # container-smoke cases run over the real image. Run under `mise exec` so the
  # pinned crossplane/cosign/syft win over any binaries on PATH.
  funcpkg-test:
    command: "mise exec -- go test ./internal/pkg/... ./internal/cli/... ./internal/function/... -run 'TestFunctionXpkg|TestFunctionIndex|TestPublishFunction|TestFunctionPackageServesGRPC' -count 1"
    env:
      CUEFN_INTEGRATION: 'true'
    inputs:
      - '@group(goSources)'
      - '@group(exampleAssets)'
    options:
      cache: false
  # Guard the lean image binary: the melange/apko build compiles with `-tags
  # noxpkg` to drop the publish commands (and internal/pkg's sigstore/cosign +
  # cloud-cred graph) from the runtime image — measured at 12.1 MiB / 23% of the
  # stripped binary. This task proves that build still compiles, so the lean path
  # cannot silently rot. Part of the default check graph (no Docker needed).
  build-image-binary:
    command: 'go build -tags noxpkg -o bin/cuefn-noxpkg ./cmd/cuefn'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/cuefn-noxpkg'

  # Server-side author-time schema proof: boots an envtest apiserver, generates
  # the de-risked module's XRD, wraps it as a real CRD, and drives chainsaw plus a
  # typed client to exercise structural acceptance, apiserver defaulting, unknown-
  # field pruning, and a status subresource round-trip. Gated behind the `envtest`
  # build tag and the chainsaw/setup-envtest binaries (pinned in mise); self-skips
  # without them. Kept OUT of the default `check` graph (mirroring render-test) so
  # `moon run root:check` stays green without those tools.
  schema-test:
    # Run under `mise exec` so the mise-pinned chainsaw and setup-envtest win over
    # any proto shims on PATH. Install the envtest binaries (idempotent), then run
    # the build-tagged harness; the harness resolves KUBEBUILDER_ASSETS itself via
    # `setup-envtest` (and honors the env var when set), so no command
    # substitution is needed.
    command: "mise exec -- bash -c 'setup-envtest use 1.35.0 -p path && go test -tags envtest ./internal/schema/... -run TestSchema_Chainsaw -count 1'"
    inputs:
      - '@group(goSources)'
      - '@group(cueModules)'
      - '@group(chainsawAssets)'
    options:
      cache: false
  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:build-image-binary'
      - 'root:test'
      - 'root:generate-check'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(cueModules)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
