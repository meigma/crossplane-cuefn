# Builds the cuefn binary into a signed Wolfi apk; apko.yaml assembles it
# into the minimal multi-arch runtime image. version/commit/date are stamped into
# the binary via -ldflags, mirroring GoReleaser and the former Dockerfile.
#
# package.version is bumped by release-please (extra-files in release-please-config.json).
# The build-time version/commit/date are injected via --vars-file (see the release
# workflow and the `image-local` mise task), so no date math runs inside the sandbox.
package:
  name: cuefn
  version: "0.1.3" # x-release-please-version
  epoch: 0
  description: cuefn — CUE-over-OCI Crossplane composition function

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - go-1.26
  environment:
    CGO_ENABLED: "0"

# Defaults; overridden at build time via `--vars-file` with the real release values.
vars:
  version: "0.0.0"
  commit: "none"
  date: "unknown"

pipeline:
  # go/build auto-adds -trimpath and installs to /usr/bin/<output>.
  - uses: go/build
    with:
      packages: ./cmd/cuefn
      output: cuefn
      go-package: go-1.26
      modroot: .
      strip: "-s -w"
      ldflags: "-buildid= -X main.version=${{vars.version}} -X main.commit=${{vars.commit}} -X main.date=${{vars.date}}"
      # -tags=noxpkg drops the publish/publish-function commands (and with them
      # internal/pkg -> crossplane-runtime xpkg -> sigstore/cosign + cloud-cred
      # SDKs) from the IMAGE binary the Function package embeds. The runtime never
      # packages or signs, so those deps are dead weight: measured at 12.1 MiB /
      # 23% of the stripped binary (53.5 -> 41.3 MiB). The full GoReleaser CLI
      # build keeps both commands.
      extra-args: "-mod=readonly -buildvcs=false -tags=noxpkg"
