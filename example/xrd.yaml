apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xapps.platform.meigma.io
spec:
  group: platform.meigma.io
  names:
    kind: XApp
    plural: xapps
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    schema:
      openAPIV3Schema:
        properties:
          spec:
            description: |-
              #Spec is the authoritative, closed XR spec schema. It feeds runtime
              defaults/validation from the same source the CLI uses for codegen. replicas is
              bounded to demonstrate schema-driven validation.
            properties:
              image:
                default: ghcr.io/stefanprodan/podinfo:6.7.0
                type: string
              replicas:
                default: 1
                maximum: 10
                minimum: 1
                type: integer
            required:
            - image
            - replicas
            type: object
          status:
            description: |-
              #Status is the optional XR status schema. The transform returns a value of
              this shape to be patched onto the composite.
            properties:
              ready:
                type: boolean
              url:
                type: string
            required:
            - ready
            - url
            type: object
        type: object
    served: true
