name: Security Scan

on:
  schedule:
    - cron: "37 9 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container-vulnerability-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve scan metadata
        id: scan
        run: |
          {
            echo "version=security-scan-${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            echo "commit=${GITHUB_SHA}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Build local scan image (melange + apko)
        env:
          VERSION: ${{ steps.scan.outputs.version }}
          COMMIT: ${{ steps.scan.outputs.commit }}
          DATE: ${{ steps.scan.outputs.date }}
        run: |
          set -euo pipefail
          printf 'version: "%s"\ncommit: "%s"\ndate: "%s"\n' "$VERSION" "$COMMIT" "$DATE" > melange-vars.yaml
          melange keygen melange.rsa
          melange build melange.yaml --arch amd64 --runner docker \
            --signing-key melange.rsa --source-dir . --vars-file melange-vars.yaml
          apko build apko.yaml crossplane-cuefn:security-scan scan.tar \
            --arch amd64 --keyring-append ./melange.rsa.pub
          docker load < scan.tar
          docker tag crossplane-cuefn:security-scan-amd64 crossplane-cuefn:security-scan

      # The Function xpkg IS the runtime image plus the package layer, so its
      # vulnerability surface must hold the same fixed-vuln posture. Assemble it
      # locally over the scan image (no push) for a second trivy scan.
      - name: Assemble Function xpkg over the scan image
        run: |
          set -euo pipefail
          go run ./cmd/cuefn publish-function \
            --runtime-image scan.tar \
            --output function.xpkg \
            --crossplane-constraint '>=v2.0.0-0'

      - name: Scan local image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: crossplane-cuefn:security-scan
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          hide-progress: true
          limit-severities-for-sarif: true

      - name: Scan Function xpkg
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: function.xpkg
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-function.sarif
          exit-code: "1"
          hide-progress: true
          limit-severities-for-sarif: true

      - name: Upload scan results
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-results.sarif
          category: container-vulnerability-scan

      - name: Upload Function xpkg scan results
        if: ${{ always() && hashFiles('trivy-function.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-function.sarif
          category: function-xpkg-vulnerability-scan
