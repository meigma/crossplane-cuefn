# Publish the Homebrew formula and Scoop manifest to the org taps AFTER a release
# is published. release.yml is tag-triggered: it builds the archives and uploads
# them to a DRAFT GitHub release, which a maintainer publishes by hand. Only then
# do the archive download URLs resolve, so the tap manifests are pushed here, on
# the `released` event (which fires for non-prerelease publishes).
#
# The manifests are templated from the release's published checksums.txt, so their
# hashes match the archives users download exactly. (An earlier version rebuilt the
# archives with GoReleaser to compute the hashes, but the archive is not
# byte-reproducible across separate CI runs — same version, same commit, different
# bytes — so the rebuilt hashes did not match the uploaded assets.) The GitHub
# release itself is left untouched; only the cross-repo tap pushes run, using the
# tap-scoped tokens.

name: Release Distribute

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: Released tag to publish to the taps
        required: true
        type: string

permissions: {}

jobs:
  publish-taps:
    name: Publish Homebrew + Scoop
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download published checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern checksums.txt --dir dist --clobber

      - name: Render tap manifests from checksums
        run: |
          python3 .github/scripts/render_tap_manifests.py \
            --tag "$RELEASE_TAG" \
            --checksums dist/checksums.txt \
            --formula-out dist/cuefn.rb \
            --scoop-out dist/cuefn.json

      - name: Publish Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          .github/scripts/push_tap.sh meigma/homebrew-tap \
            dist/cuefn.rb Formula/cuefn.rb "brew: update cuefn to ${RELEASE_TAG}"

      - name: Publish Scoop manifest
        env:
          TAP_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          .github/scripts/push_tap.sh meigma/scoop-bucket \
            dist/cuefn.json cuefn.json "scoop: update cuefn to ${RELEASE_TAG}"
