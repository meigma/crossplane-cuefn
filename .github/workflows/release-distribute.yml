# Publish the Homebrew formula and Scoop manifest to the org taps AFTER a release
# is published. release.yml is tag-triggered: it builds the archives and uploads
# them to a DRAFT GitHub release, which a maintainer publishes by hand. Only then
# do the archive download URLs resolve, so the tap manifests are pushed here, on
# the `released` event (which fires for non-prerelease publishes, matching the
# brews/scoops `skip_upload: auto`).
#
# GoReleaser rebuilds the archives to compute the formula/manifest checksums. The
# build is reproducible (-trimpath, -buildid=, mod_timestamp from the commit), so
# the rebuilt archives are byte-identical to the published assets and the
# checksums match. The GitHub release itself is left untouched (`release.disable`
# in .goreleaser.yaml); only the cross-repo tap pushes run, authenticated with
# the tap-scoped tokens.

name: Release Distribute

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: Released tag to publish to the taps
        required: true
        type: string

permissions: {}

jobs:
  publish-taps:
    name: Publish Homebrew + Scoop
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out released tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: git checkout --detach "$RELEASE_TAG"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Publish Homebrew formula and Scoop manifest
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=before,sbom
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_CURRENT_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
