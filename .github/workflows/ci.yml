name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Never auto-download a Go toolchain other than the mise-pinned one
      # (mise [env] is not carried by the action's shims, so set it on the job).
      GOTOOLCHAIN: local
      # Pin the CUE module cache to a deterministic path the cache step below can
      # persist. xrd-check and example-check resolve the example's
      # cue.dev/x/k8s.io dependency from the default central registry (no
      # CUE_REGISTRY set), so a warm cache keeps the blocking gate fast and
      # resilient to a transient registry hiccup.
      CUE_CACHE_DIR: ${{ github.workspace }}/.cue-cache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify checkout SHA
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true
          # Installs every tool from mise.toml honoring mise.lock (locked → fail
          # closed), including moon, and prepends the shim dir to PATH.

      - name: Resolve uv cache directory
        id: uv-cache
        run: echo "dir=$(uv cache dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('mise.lock', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ hashFiles('mise.lock', 'go.sum') }}-
            ${{ runner.os }}-go-build-

      - name: Cache golangci-lint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('mise.lock', '.golangci.yml', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-${{ hashFiles('mise.lock', '.golangci.yml', 'go.sum') }}-
            ${{ runner.os }}-golangci-lint-

      - name: Cache CUE modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cue-cache
          key: ${{ runner.os }}-cue-mod-${{ hashFiles('example/module/cue.mod/module.cue') }}
          restore-keys: |
            ${{ runner.os }}-cue-mod-

      - name: Cache uv downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.uv-cache.outputs.dir }}
          key: ${{ runner.os }}-uv-docs-${{ hashFiles('docs/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-docs-

      # Run the `check` task graph (format, lint, build, unit/functional tests,
      # generate-check, lean image-binary build, docs) — the fast, reliable gate.
      # NOT `moon ci`: the heavy Docker/crossplane/envtest suites are deliberately
      # excluded from `check` and run in the separate (non-blocking) integration
      # workflow, so they don't gate merges on a flaky container/timeout.
      - name: Run checks
        run: moon run root:check
