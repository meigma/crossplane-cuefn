# mise: tool + environment management for crossplane-cuefn.
#
# mise REPLACES Proto (the former .prototools + .moon/proto/*). The committed
# mise.lock records per-platform download URLs + checksums; for aqua-backed tools
# it additionally carries cosign / SLSA / GitHub-attestation verification.
# `settings.locked` makes `mise install` FAIL CLOSED when a tool lacks a
# pre-resolved URL for the current platform.
#
# moon stays the task runner / CI gate; it is configured (.moon/toolchains.yml +
# moon.yml `toolchains.default: system`) to run these tools as `system` binaries
# that mise puts on PATH.
#
# Bump a tool: edit its version here, then
#   mise lock --platform linux-x64,linux-arm64,macos-x64,macos-arm64
# and commit mise.toml + mise.lock together.

[tools]
# Language runtimes (core backend).
go = "1.26.4"
python = "3.14.3"

# Go dev-tool CLI. The explicit `aqua:` ref forces the VERIFYING backend (checksum +
# cosign/SLSA/GitHub-attestation recorded in mise.lock); it must never fall back to
# a version-only backend (asdf/npm/cargo/pipx), which records no checksum.
"aqua:golangci/golangci-lint" = "2.12.2"

# Docs (MkDocs) toolchain — moved off moon's former unstable_python/unstable_uv.
"aqua:astral-sh/uv" = "0.11.0"

# CUE CLI for the documented author workflow (`cue mod publish`): the docs
# quickstart publishes a module to an OCI registry with `cue mod publish`, the one
# author-side step the cuefn CLI does not itself perform. Pinned to the same
# cuelang.org/go the engine evaluates with (go.mod v0.16.1); the `aqua:` ref forces
# the verifying backend (checksum + attestation recorded in mise.lock). The runtime
# does not need it — only the publish-a-module step in the docs does.
"aqua:cue-lang/cue" = "0.16.1"

# Build / CI / release / supply-chain CLIs. moon itself is now mise-managed (CI
# installs it via mise instead of moonrepo/setup-toolchain). melange/apko/cosign
# are consumed by the container build + image signing in the release workflow.
"aqua:moonrepo/moon"          = "2.3.5"
"aqua:chainguard-dev/melange" = "0.54.0"
"aqua:chainguard-dev/apko"    = "1.2.19"
"aqua:sigstore/cosign"        = "3.1.1"

# SBOM generator for the local Function xpkg supply-chain proof (moon
# `funcpkg-test`): syft scans the pushed package image and the test parses the
# SPDX output. CI uses anchore/sbom-action to fetch syft; this pin makes the
# local proof reproducible. Consumed only by the gated funcpkg-test, which
# self-skips when syft is absent, so the default check graph never needs it.
"aqua:anchore/syft"           = "1.46.0"

# Crossplane CLI, used by the moon `render-test` task to drive the end-to-end
# `crossplane render` loop against a locally-served `cuefn function`. The render
# test is gated to Docker + this CLI and self-skips when either is absent.
"aqua:crossplane/crossplane"  = "2.3.3"

# Author-time schema server-side proof (moon `schema-test`): chainsaw drives the
# declarative apply/assert against an envtest apiserver, and setup-envtest installs
# the etcd + kube-apiserver binaries envtest boots. Both are consumed only by the
# build-tagged `internal/schema` chainsaw harness, which self-skips when they are
# absent, so the default check graph never needs them.
"aqua:kyverno/chainsaw"                                  = "0.2.15"
"aqua:kubernetes-sigs/controller-runtime/setup-envtest" = "0.20.4"

# Kind end-to-end proof (moon `e2e-test`): kind boots a throwaway Kubernetes
# cluster in Docker, helm installs Crossplane into it, and kubectl + chainsaw
# drive the live author->publish->install->instantiate->reconcile loop. All three
# are consumed only by the build-tagged `internal/test/e2e` harness, which self-skips
# when they (or Docker) are absent, so the default check graph never needs them.
# helm is pinned to the v3 line that the Crossplane chart install path targets.
"aqua:kubernetes-sigs/kind"        = "0.31.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.35.3"
"aqua:helm/helm"                   = "3.18.6"

[env]
# Pin the Go toolchain: never auto-download a toolchain other than the one above.
# The version here is authoritative and matches go.mod's `go 1.26.4`.
GOTOOLCHAIN = "local"

[settings]
# Read/write mise.lock, and fail closed if a tool lacks a pre-resolved URL for the
# current platform — replaces Proto's `checksum-url` and extends integrity
# enforcement to every tool.
lockfile = true
locked = true

# Local container image for testing the release build. CI builds the release image
# via the melange/apko jobs in .github/workflows/release.yml; this task is the local
# equivalent. melange needs Linux, so `--runner docker` makes `image-local` work on
# macOS too (Docker Desktop runs the Linux build container).
[tasks.image-local]
description = "Build the apko image for the host arch and load it into Docker as crossplane-cuefn:dev"
# Run under bash: mise executes inline task scripts with `sh` (dash on Linux),
# which rejects `set -o pipefail`. bash is portable across macOS and CI runners.
shell = "bash -c"
run = '''
set -euo pipefail
arch="$(go env GOARCH)"
rm -rf packages image.tar
melange keygen melange.rsa
printf 'version: "dev"\ncommit: "%s"\ndate: "%s"\n' \
  "$(git rev-parse --short HEAD 2>/dev/null || echo none)" \
  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .melange-vars.local.yaml
melange build melange.yaml --arch "$arch" --signing-key melange.rsa --runner docker \
  --source-dir . --vars-file .melange-vars.local.yaml
apko build apko.yaml crossplane-cuefn:dev image.tar --arch "$arch" --keyring-append ./melange.rsa.pub
docker load < image.tar
docker tag "crossplane-cuefn:dev-$arch" crossplane-cuefn:dev
echo "loaded crossplane-cuefn:dev (host arch $arch)"
'''

# Local Function xpkg packaging proof: assemble the Function package over the
# apko-built crossplane-cuefn:dev runtime image (build it first with
# `mise run image-local`) and push it to a destination ref. The package image IS
# the runtime image plus the package.yaml layer, so it both installs as a
# Crossplane Function and serves `cuefn function`. Pass the destination ref and
# any flags after `--`, e.g.
#   mise run package-function -- --package localhost:5005/function-cuefn:dev --insecure
[tasks.package-function]
description = "Assemble + push the Function xpkg over crossplane-cuefn:dev (image.tar)"
# Run under bash (see image-local): `set -o pipefail` is not valid in dash.
shell = "bash -c"
run = '''
set -euo pipefail
if [ ! -f image.tar ]; then
  echo "image.tar not found; run 'mise run image-local' first" >&2
  exit 1
fi
go run ./cmd/cuefn publish-function --runtime-image image.tar "$@"
'''
