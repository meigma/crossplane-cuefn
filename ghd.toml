version = 1

[provenance]
signer_workflow = "meigma/crossplane-cuefn/.github/workflows/attest.yml"

[[packages]]
name = "cuefn"
description = "cuefn — CUE-over-OCI Crossplane composition function CLI."
tag_pattern = "v${version}"

[[packages.assets]]
os = "darwin"
arch = "amd64"
pattern = "cuefn_${version}_darwin_amd64"

[[packages.assets]]
os = "darwin"
arch = "arm64"
pattern = "cuefn_${version}_darwin_arm64"

[[packages.assets]]
os = "linux"
arch = "amd64"
pattern = "cuefn_${version}_linux_amd64"

[[packages.assets]]
os = "linux"
arch = "arm64"
pattern = "cuefn_${version}_linux_arm64"

[[packages.binaries]]
path = "cuefn"
