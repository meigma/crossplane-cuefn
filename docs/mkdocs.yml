site_name: crossplane-cuefn
site_description: Crossplane v2 composition function that renders Kubernetes resources from CUE modules
site_url: https://meigma.github.io/crossplane-cuefn/
repo_name: meigma/crossplane-cuefn
repo_url: https://github.com/meigma/crossplane-cuefn
edit_uri: edit/master/docs/docs/
docs_dir: docs
site_dir: build
strict: true

theme:
  name: material
  language: en
  features:
    - content.action.edit
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - How-to:
      - Render a module locally: how-to/render-locally.md
      - Generate an XRD: how-to/generate-xrd.md
      - Validate an XR: how-to/validate-xr.md
      - Publish a Configuration: how-to/publish-configuration.md
      - Publish the Function: how-to/publish-function.md
      - Serve the function: how-to/serve-function.md
      - Local toolchain (mise): how-to/local-toolchain.md
      - Build the runtime image: how-to/build-image.md
  - Reference:
      - Module contract: reference/module-contract.md
      - CLI: reference/cli.md
      - Configuration & environment: reference/configuration.md
      - Input CRD: reference/input.md
  - Explanation:
      - One module, two outputs: explanation/one-module-two-outputs.md
      - Schema-runtime digest lock-step: explanation/digest-lockstep.md
      - Reserved-key projection: explanation/reserved-key-projection.md
      - Lean runtime image (noxpkg): explanation/noxpkg-split.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

extra_css:
  - stylesheets/palette.css
