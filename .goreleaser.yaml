version: 2

project_name: cuefn

before:
  hooks:
    - go test ./...

builds:
  - id: cuefn
    main: ./cmd/cuefn
    binary: cuefn
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Scoop only needs amd64; skip the rarely used windows/arm64 target.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: cuefn
    ids:
      - cuefn
    formats:
      - tar.gz
    # Windows consumers (Scoop) expect a zip.
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive

# Publish a Homebrew formula (macOS + Linux) and a Scoop manifest (Windows) to
# the org taps. These run in the publish phase, driven by the post-publish
# release-distribute.yml workflow once the draft release is published, so the
# archive download URLs resolve. GoReleaser filters archives by OS, so the
# formula consumes the darwin/linux tarballs and the manifest the windows zip.
# skip_upload: auto keeps prereleases out of the taps.
brews:
  - repository:
      owner: meigma
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    # release: disabled means the URL cannot be derived from the release config,
    # so point the formula directly at the published release asset.
    url_template: "https://github.com/meigma/crossplane-cuefn/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/meigma/crossplane-cuefn"
    description: "Crossplane v2 composition function that renders Kubernetes resources from CUE modules"
    license: "Apache-2.0 OR MIT"
    skip_upload: auto
    commit_msg_template: "brew: update {{ .ProjectName }} to {{ .Tag }}"
    test: |
      system "#{bin}/cuefn", "--version"
    install: |
      bin.install "cuefn"

scoops:
  - repository:
      owner: meigma
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    url_template: "https://github.com/meigma/crossplane-cuefn/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/meigma/crossplane-cuefn"
    description: "Crossplane v2 composition function that renders Kubernetes resources from CUE modules"
    license: "Apache-2.0 OR MIT"
    skip_upload: auto
    commit_msg_template: "scoop: update {{ .ProjectName }} to {{ .Tag }}"

changelog:
  disable: true

release:
  disable: true
