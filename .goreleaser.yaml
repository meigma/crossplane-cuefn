version: 2

project_name: cuefn

before:
  hooks:
    - go test ./...

builds:
  - id: cuefn
    main: ./cmd/cuefn
    binary: cuefn
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Scoop only needs amd64; skip the rarely used windows/arm64 target.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: cuefn
    ids:
      - cuefn
    formats:
      - tar.gz
    # Windows consumers (Scoop) expect a zip.
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive

# The Homebrew formula and Scoop manifest are NOT published by GoReleaser. They
# are templated from the release's published checksums.txt and pushed to the org
# taps by .github/workflows/release-distribute.yml, because a GoReleaser rebuild
# is not byte-reproducible across separate CI runs and produced hashes that did
# not match the uploaded archives.

changelog:
  disable: true

release:
  disable: true
